name: Build MariaDB for macOS

on:
  push:
    tags:
      - 'v*'

env:
  MARIADB_VERSION: "12.2.2"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: |
          XCODE_APP="/Applications/Xcode_15.4.app"
          if [ ! -d "${XCODE_APP}" ]; then
            echo "Expected Xcode not found: ${XCODE_APP}"
            exit 1
          fi
          echo "Selected Xcode: ${XCODE_APP}"
          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version
          xcrun clang --version
          xcrun clang++ --version
          echo "DEVELOPER_DIR=${XCODE_APP}/Contents/Developer" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: |
          brew install cmake openssl@3 bison pkg-config pcre2

      - name: Sanitize environment
        run: |
          # Prevent Homebrew headers from shadowing Xcode/SDK system headers
          echo "CPATH=" >> "${GITHUB_ENV}"
          echo "C_INCLUDE_PATH=" >> "${GITHUB_ENV}"
          echo "CPLUS_INCLUDE_PATH=" >> "${GITHUB_ENV}"

      - name: Inspect libc++ headers
        run: |
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          CXX="$(xcrun --find clang++)"
          export SDKROOT="${SDK_PATH}"
          echo "=== Diagnostics ==="
          echo "SDK path: ${SDK_PATH}"
          echo "CXX: ${CXX}"
          echo "xcode-select: $(xcode-select -p)"
          echo "SDK c++/v1 exists:       $([ -d "${SDK_PATH}/usr/include/c++/v1" ] && echo YES || echo NO)"
          echo "SDK c++/v1/stddef.h:     $([ -f "${SDK_PATH}/usr/include/c++/v1/stddef.h" ] && echo YES || echo NO)"
          echo "=== Default C++ include search order ==="
          printf '' | "${CXX}" -std=c++17 -stdlib=libc++ -x c++ -E -v - 2>&1 | \
            sed -n '/#include <...> search starts here:/,/End of search list./p'
          echo "===================" 
          echo "SDKROOT=${SDK_PATH}" >> "${GITHUB_ENV}"

      - name: Download MariaDB source
        run: |
          curl -fSL -o "mariadb-${MARIADB_VERSION}.tar.gz" \
            "https://archive.mariadb.org/mariadb-${MARIADB_VERSION}/source/mariadb-${MARIADB_VERSION}.tar.gz"
          tar xzf "mariadb-${MARIADB_VERSION}.tar.gz"

      - name: Configure
        run: |
          OPENSSL_ROOT="$(brew --prefix openssl@3)"
          BISON_ROOT="$(brew --prefix bison)"

          cd "mariadb-${MARIADB_VERSION}"
          rm -rf build
          mkdir build && cd build

          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          CC="$(xcrun --find clang)"
          CXX="$(xcrun --find clang++)"
          ZLIB_INCLUDE_DIR="${SDK_PATH}/usr/include"
          ZLIB_LIBRARY="${SDK_PATH}/usr/lib/libz.tbd"
          echo "SDK_PATH=${SDK_PATH}"
          echo "CC=${CC}  CXX=${CXX}"
          echo "ZLIB_INCLUDE_DIR=${ZLIB_INCLUDE_DIR}"
          echo "ZLIB_LIBRARY=${ZLIB_LIBRARY}"

          # Export SDKROOT so Clang automatically resolves SDK and libc++ headers
          export SDKROOT="${SDK_PATH}"

          cmake .. \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}" \
            -DCMAKE_INSTALL_PREFIX="/mariadb-${MARIADB_VERSION}-macos-${{ matrix.arch }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DCMAKE_EXE_LINKER_FLAGS="-stdlib=libc++" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_OSX_SYSROOT="${SDK_PATH}" \
            -DCMAKE_FIND_FRAMEWORK=LAST \
            -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}" \
            -DOPENSSL_INCLUDE_DIR="${OPENSSL_ROOT}/include" \
            -DZLIB_INCLUDE_DIR="${ZLIB_INCLUDE_DIR}" \
            -DZLIB_LIBRARY="${ZLIB_LIBRARY}" \
            -DBISON_EXECUTABLE="${BISON_ROOT}/bin/bison" \
            -DDEFAULT_CHARSET=utf8mb4 \
            -DDEFAULT_COLLATION=utf8mb4_general_ci \
            -DWITH_WSREP=OFF \
            -DPLUGIN_WSREP=NO \
            -DWITH_ROCKSDB=OFF \
            -DPLUGIN_ROCKSDB=NO \
            -DPLUGIN_MROONGA=NO \
            -DPLUGIN_COLUMNSTORE=NO \
            -DWITH_JEMALLOC=OFF \
            -DWITH_UNIT_TESTS=OFF \
            -DWITH_MARIABACKUP=ON

      - name: Build
        run: |
          cd "mariadb-${MARIADB_VERSION}/build"
          make VERBOSE=1 -j$(sysctl -n hw.logicalcpu)

      - name: Package
        run: |
          INSTALL_DIR="mariadb-${MARIADB_VERSION}-macos-${{ matrix.arch }}"

          cd "mariadb-${MARIADB_VERSION}/build"
          make install DESTDIR="${GITHUB_WORKSPACE}/stage"

          cd "${GITHUB_WORKSPACE}/stage"
          tar czf "${GITHUB_WORKSPACE}/${INSTALL_DIR}.tar.gz" "${INSTALL_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-${{ env.MARIADB_VERSION }}-macos-${{ matrix.arch }}
          path: mariadb-${{ env.MARIADB_VERSION }}-macos-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mariadb-*/mariadb-*.tar.gz
          generate_release_notes: true
