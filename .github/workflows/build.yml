name: Build MariaDB for macOS

on:
  push:
    tags:
      - 'mariadb-[0-9]*.[0-9]*.[0-9]*'

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13   # Intel x86_64
            arch: x86_64
          - runner: macos-14   # Apple Silicon arm64
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Extract metadata from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#mariadb-}"
          ARCHIVE_NAME="mariadb-${VERSION}-macos-${{ matrix.arch }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew install \
            cmake \
            openssl@3 \
            pcre \
            pcre2 \
            libevent \
            lz4 \
            zstd \
            snappy \
            bison \
            pkg-config \
            libxml2 \
            xz

      - name: Download MariaDB source
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          DOWNLOAD_URL="https://archive.mariadb.org/mariadb-${VERSION}/source/mariadb-${VERSION}.tar.gz"
          echo "Downloading: ${DOWNLOAD_URL}"
          curl -fSL --retry 3 --retry-delay 5 \
            "${DOWNLOAD_URL}" \
            -o "mariadb-${VERSION}.tar.gz"
          tar xzf "mariadb-${VERSION}.tar.gz"
          echo "Source extracted: $(du -sh mariadb-${VERSION} | cut -f1)"

      - name: Configure CMake
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          ARCHIVE_NAME="${{ steps.meta.outputs.archive_name }}"
          BREW_PREFIX="$(brew --prefix)"

          cmake -S "mariadb-${VERSION}" -B "mariadb-${VERSION}/build" \
            -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/${ARCHIVE_NAME}" \
            -DCMAKE_PREFIX_PATH="${BREW_PREFIX}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0" \
            -DOPENSSL_ROOT_DIR="${BREW_PREFIX}/opt/openssl@3" \
            -DBISON_EXECUTABLE="${BREW_PREFIX}/opt/bison/bin/bison" \
            -DWITH_SSL=system \
            -DWITH_ZLIB=system \
            -DWITH_UNIT_TESTS=OFF \
            -DWITH_EMBEDDED_SERVER=OFF \
            -DWITH_WSREP=OFF \
            -DWITH_JEMALLOC=OFF \
            -DPLUGIN_ROCKSDB=NO \
            -DPLUGIN_MROONGA=NO \
            -DPLUGIN_FEEDBACK=NO \
            -DDEFAULT_CHARSET=utf8mb4 \
            -DDEFAULT_COLLATION=utf8mb4_general_ci

      - name: Build
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          cmake --build "mariadb-${VERSION}/build" \
            --config "${BUILD_TYPE}" \
            --parallel "$(sysctl -n hw.logicalcpu)"

      - name: Install
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          cmake --install "mariadb-${VERSION}/build" \
            --config "${BUILD_TYPE}"

      - name: Create archive and checksum
        run: |
          ARCHIVE_NAME="${{ steps.meta.outputs.archive_name }}"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}/"
          shasum -a 256 "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"
          echo "Archive size: $(du -sh ${ARCHIVE_NAME}.tar.gz | cut -f1)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.archive_name }}
          path: |
            ${{ steps.meta.outputs.archive_name }}.tar.gz
            ${{ steps.meta.outputs.archive_name }}.tar.gz.sha256
          retention-days: 1
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#mariadb-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MariaDB ${{ steps.meta.outputs.version }} for macOS"
          body: |
            Pre-built **MariaDB ${{ steps.meta.outputs.version }}** binaries for macOS.

            ## Downloads

            | Architecture | File |
            |---|---|
            | Intel (x86_64) | `mariadb-${{ steps.meta.outputs.version }}-macos-x86_64.tar.gz` |
            | Apple Silicon (arm64) | `mariadb-${{ steps.meta.outputs.version }}-macos-arm64.tar.gz` |

            ## Verify Checksums

            ```bash
            shasum -a 256 -c mariadb-${{ steps.meta.outputs.version }}-macos-<arch>.tar.gz.sha256
            ```

            ## Quick Start

            ```bash
            # Extract
            tar xzf mariadb-${{ steps.meta.outputs.version }}-macos-<arch>.tar.gz
            cd mariadb-${{ steps.meta.outputs.version }}-macos-<arch>

            # Initialize data directory (first time only)
            ./scripts/mariadb-install-db --datadir=$(pwd)/data --basedir=$(pwd)

            # Start server
            ./bin/mariadbd --datadir=$(pwd)/data --basedir=$(pwd) \
              --socket=/tmp/mariadb.sock --port=3306 &

            # Connect
            ./bin/mariadb --socket=/tmp/mariadb.sock

            # Shutdown
            ./bin/mariadb-admin --socket=/tmp/mariadb.sock shutdown
            ```

            ## Build Info

            - macOS deployment target: 12.0 (Monterey+)
            - SSL: OpenSSL 3.x
            - Default charset: `utf8mb4`, collation: `utf8mb4_general_ci`
            - Built from official source: [archive.mariadb.org](https://archive.mariadb.org)
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
